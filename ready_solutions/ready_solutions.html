    <!-- ADD SOLUTION MODAL (Hidden by default) -->
    <div id="addSolutionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-plus-circle"></i> Add New Solution</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="solutionForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="solutionTitle"><i class="fas fa-heading"></i> Title *</label>
                        <input type="text" id="solutionTitle" name="title" placeholder="Enter solution title" required>
                    </div>

                    <div class="form-group">
                        <label for="solutionDescription"><i class="fas fa-file-alt"></i> Description *</label>
                        <textarea id="solutionDescription" name="description" rows="4" placeholder="Describe your solution..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="solutionLink"><i class="fas fa-link"></i> Link (Optional)</label>
                        <input type="url" id="solutionLink" name="link" placeholder="https://example.com">
                        <small>External link for demo, purchase, or documentation</small>
                    </div>

                    <div class="form-group">
                        <label for="solutionImage"><i class="fas fa-image"></i> Solution Image *</label>
                        <div class="image-upload-container">
                            <input type="file" id="solutionImage" name="image" accept="image/*" required>
                            <label for="solutionImage" class="upload-label">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Choose an image</span>
                            </label>
                            <div class="image-preview" id="imagePreview">
                                <img id="previewImage" src="" alt="Preview">
                                <span>No image selected</span>
                            </div>
                        </div>
                        <small>Max size: 5MB. Allowed: JPG, PNG, GIF, WEBP</small>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="cancel-btn">Cancel</button>
                        <button type="submit" class="submit-btn">
                            <i class="fas fa-paper-plane"></i> Publish Solution
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <main class="cards-container">
        <!-- Solutions will be loaded dynamically by JavaScript -->
        <div id="loadingSpinner" class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i> Loading solutions...
        </div>
        
        <div id="solutionsGrid" class="solutions-grid">
            <!-- Dynamic content will be inserted here -->
        </div>
    </main>
