<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Skillara</title>
  <link rel="stylesheet" href="register.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <section class="register-section">
    <div class="register-container">
      <h2>Create Your Account</h2>

      <!-- User Type Selection -->
      <div class="user-type-selection">
        <label>
          <input type="radio" name="role" value="client" checked>
          Client
        </label>
        <label>
          <input type="radio" name="role" value="provider">
          Service Provider
        </label>
      </div>

      <!-- Registration Form -->
      <form id="registerForm">
        <input type="text" name="full_name" placeholder="Full Name" required>
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        <!-- Service Provider extra fields -->
        <div id="providerFields">
          <input type="text" name="service_type" placeholder="Service Type">
          <input type="text" name="business_name" placeholder="Business Name">
          <input type="text" name="location" placeholder="Location (City, Country)">
        </div>

        <button type="submit">Register</button>
      </form>

      <p class="login-link">Already have an account? <a href="/skillara/login/login.html">Login here</a></p>
    </div>
  </section>

  <script src="register.js"></script>
</body>
</html>
